services:
  db:
    image: postgres:17-alpine
    container_name: ads_dashboard_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-ads_dashboard}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: ads_dashboard_api
    restart: always
    ports:
      - "8000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@db:5432/${POSTGRES_DB:-ads_dashboard}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-key-change-it}
      ENVIRONMENT: development
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data:
